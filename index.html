<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Visite · Fisioterapia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde-scuro: #1a2e24;
    --verde-medio: #2a7a5c;
    --verde-chiaro: #7aaa8a;
    --crema: #f7f5f0;
    --crema-scura: #ede9e0;
    --testo: #1a2e24;
    --testo-muted: #7a8a7e;

    --samot-bg: #e8f4f0;
    --samot-accent: #2a7a5c;
    --samot-badge: #d0ede4;

    --privato-bg: #f0f0f8;
    --privato-accent: #4a4a9a;
    --privato-badge: #dcdcf4;

    --giulia-bg: #fdf4e8;
    --giulia-accent: #b07020;
    --giulia-badge: #f5e4c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--crema);
    color: var(--testo);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    background: var(--verde-scuro);
    color: var(--crema);
    padding: 32px 20px 24px;
    text-align: center;
    position: relative;
  }
  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--verde-chiaro);
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .mese-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
  }
  .mese-nav button {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--crema);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .mese-nav button:hover { background: rgba(255,255,255,0.22); }
  .mese-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    min-width: 180px;
    text-align: center;
  }

  .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 20px 0 12px;
  }
  .card {
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    border: 1px solid transparent;
    transition: transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.samot   { background: var(--samot-bg);   border-color: var(--samot-badge); }
  .card.privato { background: var(--privato-bg); border-color: var(--privato-badge); }
  .card.giulia  { background: var(--giulia-bg);  border-color: var(--giulia-badge); }
  .card-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: 500;
  }
  .card.samot   .card-label { color: var(--samot-accent); }
  .card.privato .card-label { color: var(--privato-accent); }
  .card.giulia  .card-label { color: var(--giulia-accent); }
  .card-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .card.samot   .card-amount { color: var(--samot-accent); }
  .card.privato .card-amount { color: var(--privato-accent); }
  .card.giulia  .card-amount { color: var(--giulia-accent); }
  .card-count { font-size: 10px; color: var(--testo-muted); margin-top: 4px; }

  .totale-bar {
    background: var(--verde-scuro);
    color: var(--crema);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .totale-bar-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--verde-chiaro);
  }
  .totale-bar-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 700;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filtro-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: #fff;
    color: #555;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filtro-btn.active {
    background: var(--verde-scuro);
    color: var(--crema);
    border-color: var(--verde-scuro);
  }
  .filtro-btn:hover:not(.active) { background: var(--crema-scura); }
  .btn-aggiungi {
    margin-left: auto;
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    background: var(--verde-medio);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-aggiungi:hover { background: var(--verde-scuro); }

  .visite-list {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(26,46,36,0.07);
  }
  .visita-row {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--crema-scura);
    transition: background 0.1s;
    animation: fadeIn 0.25s ease;
  }
  .visita-row:last-child { border-bottom: none; }
  .visita-row:hover { background: var(--crema); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .visita-data-badge {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.3px; line-height: 1.3;
    text-align: center;
  }
  .visita-info { flex: 1; min-width: 0; }
  .visita-nome { font-size: 14px; font-weight: 500; color: var(--testo); }
  .visita-tags { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; align-items: center; }
  .tag {
    font-size: 10px; border-radius: 4px;
    padding: 2px 7px; font-weight: 500;
  }
  .tag.samot   { background: var(--samot-badge);   color: var(--samot-accent); }
  .tag.privato { background: var(--privato-badge); color: var(--privato-accent); }
  .tag.giulia  { background: var(--giulia-badge);  color: var(--giulia-accent); }
  .tag-note { font-size: 10px; color: var(--testo-muted); font-style: italic; }
  .visita-importo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 700;
    min-width: 46px; text-align: right;
  }
  .visita-actions { display: flex; gap: 5px; }
  .btn-icon {
    background: none;
    border: 1px solid var(--crema-scura);
    border-radius: 7px; padding: 5px 8px;
    cursor: pointer; font-size: 13px;
    transition: background 0.15s;
  }
  .btn-icon:hover { background: var(--crema-scura); }

  .empty-state {
    padding: 48px 20px; text-align: center;
    color: var(--testo-muted); font-size: 14px;
  }
  .empty-state span { font-size: 36px; display: block; margin-bottom: 12px; }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    animation: overlayIn 0.2s ease;
  }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 680px;
    padding: 28px 20px 48px;
    animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--crema-scura);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    color: var(--testo); margin-bottom: 20px;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--testo-muted); margin-bottom: 5px; font-weight: 500;
  }
  .form-input, .form-select {
    width: 100%; padding: 11px 14px;
    border-radius: 10px; border: 1px solid #ddd;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--testo); background: var(--crema);
    transition: border-color 0.15s; appearance: none;
  }
  .form-input:focus, .form-select:focus {
    outline: none; border-color: var(--verde-medio);
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-annulla {
    flex: 1; padding: 13px; border-radius: 12px;
    border: 1px solid #ddd; background: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
  }
  .btn-salva {
    flex: 2; padding: 13px; border-radius: 12px;
    border: none; background: var(--verde-scuro); color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-salva:hover { background: var(--verde-medio); }

  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-box {
    background: #fff; border-radius: 16px;
    padding: 28px 24px; max-width: 300px; width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .confirm-box .icon { font-size: 36px; margin-bottom: 12px; }
  .confirm-box p { font-size: 15px; color: var(--testo); margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; }
  .btn-no {
    flex: 1; padding: 10px; border-radius: 8px;
    border: 1px solid #ddd; background: #fff;
    font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 14px;
  }
  .btn-si {
    flex: 1; padding: 10px; border-radius: 8px;
    border: none; background: #c44; color: #fff;
    font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 14px;
  }

  @media (max-width: 400px) {
    .header-title { font-size: 24px; }
    .card-amount { font-size: 20px; }
    .visita-actions { flex-direction: column; gap: 3px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Registro Visite</div>
  <div class="header-title">Fisioterapia</div>
  <div class="mese-nav">
    <button onclick="cambioMese(-1)">&#8249;</button>
    <div class="mese-label" id="mese-label"></div>
    <button onclick="cambioMese(1)">&#8250;</button>
  </div>
</div>

<div class="container">
  <div class="cards-grid">
    <div class="card samot">
      <div class="card-label">SAMOT</div>
      <div class="card-amount" id="tot-samot">€0</div>
      <div class="card-count" id="cnt-samot">0 visite</div>
    </div>
    <div class="card privato">
      <div class="card-label">Privato</div>
      <div class="card-amount" id="tot-privato">€0</div>
      <div class="card-count" id="cnt-privato">0 visite</div>
    </div>
    <div class="card giulia">
      <div class="card-label">Giulia</div>
      <div class="card-amount" id="tot-giulia">€0</div>
      <div class="card-count" id="cnt-giulia">0 ore</div>
    </div>
  </div>

  <div class="totale-bar">
    <div class="totale-bar-label" id="totale-label">Totale</div>
    <div class="totale-bar-amount" id="totale-amount">€0</div>
  </div>

  <div class="toolbar">
    <button class="filtro-btn active" data-filtro="Tutti" onclick="setFiltro('Tutti')">Tutti</button>
    <button class="filtro-btn" data-filtro="SAMOT" onclick="setFiltro('SAMOT')">SAMOT</button>
    <button class="filtro-btn" data-filtro="Privato" onclick="setFiltro('Privato')">Privato</button>
    <button class="filtro-btn" data-filtro="Giulia" onclick="setFiltro('Giulia')">Giulia</button>
    <button class="btn-aggiungi" onclick="apriForm()">+ Aggiungi</button>
  </div>

  <div class="visite-list" id="visite-list"></div>
</div>

<!-- MODALE FORM -->
<div class="overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nuova visita</div>

    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-select" id="f-categoria" onchange="aggiornaCampiForm()">
        <option value="SAMOT">SAMOT</option>
        <option value="Privato">Privato</option>
        <option value="Giulia">Giulia</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Paziente</label>
      <input class="form-input" id="f-paziente" type="text" placeholder="Nome paziente">
    </div>
    <div class="form-group">
      <label class="form-label">Data</label>
      <input class="form-input" id="f-data" type="date">
    </div>
    <div class="form-group" id="gruppo-ore" style="display:none">
      <label class="form-label">Ore</label>
      <input class="form-input" id="f-ore" type="number" min="0.5" step="0.5" value="1">
    </div>
    <div class="form-group">
      <label class="form-label">Note (opzionale)</label>
      <input class="form-input" id="f-note" type="text" placeholder="es. sostituzione, prima visita…">
    </div>

    <div class="modal-actions">
      <button class="btn-annulla" onclick="chiudiForm()">Annulla</button>
      <button class="btn-salva" onclick="salvaVisita()" id="btn-salva-text">Aggiungi</button>
    </div>
  </div>
</div>

<!-- CONFIRM ELIMINA -->
<div class="confirm-overlay" id="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <div class="icon">🗑️</div>
    <p>Eliminare questa visita?</p>
    <div class="confirm-actions">
      <button class="btn-no" onclick="chiudiConferma()">No</button>
      <button class="btn-si" onclick="confermElimina()">Sì, elimina</button>
    </div>
  </div>
</div>

<script>
const TARIFFE = { SAMOT: 22, Privato: 30, Giulia: 15 };
const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
              "Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

const VISITE_DEFAULT = [
  { id:1,  categoria:"Giulia",  paziente:"Giulia",       data:"2025-04-09", ore:1, note:"" },
  { id:2,  categoria:"Giulia",  paziente:"Giulia",       data:"2025-04-14", ore:2, note:"" },
  { id:3,  categoria:"Giulia",  paziente:"Giulia",       data:"2025-04-23", ore:4, note:"" },
  { id:4,  categoria:"Privato", paziente:"Sg Maria",     data:"2025-04-08", ore:1, note:"" },
  { id:5,  categoria:"Privato", paziente:"Sg Maria",     data:"2025-04-11", ore:1, note:"" },
  { id:6,  categoria:"Privato", paziente:"Attilio",      data:"2025-04-01", ore:1, note:"" },
  { id:7,  categoria:"Privato", paziente:"Attilio",      data:"2025-04-07", ore:1, note:"" },
  { id:8,  categoria:"Privato", paziente:"Attilio",      data:"2025-04-14", ore:1, note:"" },
  { id:9,  categoria:"Privato", paziente:"Attilio",      data:"2025-04-23", ore:1, note:"" },
  { id:10, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-01", ore:1, note:"" },
  { id:11, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-07", ore:1, note:"" },
  { id:12, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-09", ore:1, note:"" },
  { id:13, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-10", ore:1, note:"" },
  { id:14, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-14", ore:1, note:"" },
  { id:15, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-23", ore:1, note:"" },
  { id:16, categoria:"SAMOT",   paziente:"Scifo",        data:"2025-04-24", ore:1, note:"" },
  { id:17, categoria:"SAMOT",   paziente:"Bassotto",     data:"2025-04-01", ore:1, note:"" },
  { id:18, categoria:"SAMOT",   paziente:"Bassotto",     data:"2025-04-09", ore:1, note:"" },
  { id:19, categoria:"SAMOT",   paziente:"Bassotto",     data:"2025-04-23", ore:1, note:"" },
  { id:20, categoria:"SAMOT",   paziente:"Matarazzo",    data:"2025-04-15", ore:1, note:"" },
  { id:21, categoria:"SAMOT",   paziente:"Varacalli",    data:"2025-04-23", ore:1, note:"" },
  { id:22, categoria:"SAMOT",   paziente:"Sostituzione", data:"2025-04-01", ore:1, note:"Sostituzione 1" },
  { id:23, categoria:"SAMOT",   paziente:"Sostituzione", data:"2025-04-01", ore:1, note:"Sostituzione 2" },
  { id:24, categoria:"SAMOT",   paziente:"Sostituzione", data:"2025-04-01", ore:1, note:"Sostituzione 3" },
  { id:25, categoria:"SAMOT",   paziente:"Sostituzione", data:"2025-04-01", ore:1, note:"Sostituzione 4" },
];

let visite = [];
let filtroAttivo = "Tutti";
let meseAttivo = "2025-04";
let editId = null;
let eliminaId = null;
let nextId = 200;

function salvaStorage() {
  localStorage.setItem("fisio_visite", JSON.stringify(visite));
  localStorage.setItem("fisio_nextId", nextId);
}
function caricaStorage() {
  const saved = localStorage.getItem("fisio_visite");
  const sid   = localStorage.getItem("fisio_nextId");
  if (saved) {
    visite = JSON.parse(saved);
    nextId = sid ? parseInt(sid) : 200;
  } else {
    visite = JSON.parse(JSON.stringify(VISITE_DEFAULT));
    salvaStorage();
  }
}

function guadagno(v) {
  const t = TARIFFE[v.categoria] || 0;
  return v.categoria === "Giulia" ? t * v.ore : t;
}
function formatData(d) {
  const [y,m,g] = d.split("-");
  return `${g}/${m}`;
}
function catClass(cat) {
  return { SAMOT:"samot", Privato:"privato", Giulia:"giulia" }[cat] || "";
}
const COLORI = {
  SAMOT:   { badge: "#d0ede4", accent: "#2a7a5c" },
  Privato: { badge: "#dcdcf4", accent: "#4a4a9a" },
  Giulia:  { badge: "#f5e4c0", accent: "#b07020" },
};

function render() {
  const [y, m] = meseAttivo.split("-");
  document.getElementById("mese-label").textContent =
    `${MESI[parseInt(m)-1]} ${y}`.toUpperCase();

  const filtrate = visite
    .filter(v => {
      const meseV = v.data.substring(0,7);
      return (filtroAttivo === "Tutti" || v.categoria === filtroAttivo)
          && meseV === meseAttivo;
    })
    .sort((a,b) => a.data.localeCompare(b.data));

  const tot = { SAMOT:0, Privato:0, Giulia:0 };
  const cnt = { SAMOT:0, Privato:0, Giulia:0 };
  let totOreGiulia = 0;
  filtrate.forEach(v => {
    tot[v.categoria] = (tot[v.categoria]||0) + guadagno(v);
    cnt[v.categoria] = (cnt[v.categoria]||0) + 1;
    if (v.categoria === "Giulia") totOreGiulia += v.ore;
  });
  const totale = tot.SAMOT + tot.Privato + tot.Giulia;

  document.getElementById("tot-samot").textContent   = `€${tot.SAMOT}`;
  document.getElementById("tot-privato").textContent = `€${tot.Privato}`;
  document.getElementById("tot-giulia").textContent  = `€${tot.Giulia}`;
  document.getElementById("cnt-samot").textContent   = `${cnt.SAMOT} visite`;
  document.getElementById("cnt-privato").textContent = `${cnt.Privato} visite`;
  document.getElementById("cnt-giulia").textContent  = totOreGiulia > 0 ? `${totOreGiulia}h` : "0 ore";
  document.getElementById("totale-amount").textContent = `€${totale}`;
  document.getElementById("totale-label").textContent  = `Totale ${MESI[parseInt(m)-1]} ${y}`;

  const list = document.getElementById("visite-list");
  if (filtrate.length === 0) {
    list.innerHTML = `<div class="empty-state"><span>📋</span>Nessuna visita in questo periodo</div>`;
    return;
  }

  list.innerHTML = filtrate.map(v => {
    const cc  = catClass(v.categoria);
    const col = COLORI[v.categoria];
    const g   = guadagno(v);
    const ore  = v.categoria === "Giulia" ? `<span class="tag-note">${v.ore}h</span>` : "";
    const nota = v.note ? `<span class="tag-note">${v.note}</span>` : "";
    return `
      <div class="visita-row">
        <div class="visita-data-badge" style="background:${col.badge};color:${col.accent}">
          ${formatData(v.data)}
        </div>
        <div class="visita-info">
          <div class="visita-nome">${v.paziente}</div>
          <div class="visita-tags">
            <span class="tag ${cc}">${v.categoria}</span>
            ${ore}${nota}
          </div>
        </div>
        <div class="visita-importo" style="color:${col.accent}">€${g}</div>
        <div class="visita-actions">
          <button class="btn-icon" onclick="apriModifica(${v.id})" title="Modifica">✏️</button>
          <button class="btn-icon" onclick="apriConfermaElimina(${v.id})" title="Elimina">🗑</button>
        </div>
      </div>`;
  }).join("");
}

function cambioMese(dir) {
  let [y, m] = meseAttivo.split("-").map(Number);
  m += dir;
  if (m > 12) { m = 1; y++; }
  if (m < 1)  { m = 12; y--; }
  meseAttivo = `${y}-${String(m).padStart(2,"0")}`;
  render();
}
function setFiltro(f) {
  filtroAttivo = f;
  document.querySelectorAll(".filtro-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.filtro === f);
  });
  render();
}

function aggiornaCampiForm() {
  const cat = document.getElementById("f-categoria").value;
  document.getElementById("gruppo-ore").style.display = cat === "Giulia" ? "block" : "none";
}
function apriForm() {
  editId = null;
  document.getElementById("modal-title").textContent = "Nuova visita";
  document.getElementById("btn-salva-text").textContent = "Aggiungi";
  document.getElementById("f-categoria").value = "SAMOT";
  document.getElementById("f-paziente").value = "";
  document.getElementById("f-data").value = meseAttivo + "-01";
  document.getElementById("f-ore").value = "1";
  document.getElementById("f-note").value = "";
  aggiornaCampiForm();
  document.getElementById("modal-overlay").style.display = "flex";
}
function apriModifica(id) {
  const v = visite.find(x => x.id === id);
  if (!v) return;
  editId = id;
  document.getElementById("modal-title").textContent = "Modifica visita";
  document.getElementById("btn-salva-text").textContent = "Salva modifiche";
  document.getElementById("f-categoria").value = v.categoria;
  document.getElementById("f-paziente").value = v.paziente;
  document.getElementById("f-data").value = v.data;
  document.getElementById("f-ore").value = v.ore;
  document.getElementById("f-note").value = v.note;
  aggiornaCampiForm();
  document.getElementById("modal-overlay").style.display = "flex";
}
function chiudiForm() {
  document.getElementById("modal-overlay").style.display = "none";
}
function salvaVisita() {
  const cat = document.getElementById("f-categoria").value;
  const paz = document.getElementById("f-paziente").value.trim();
  const dat = document.getElementById("f-data").value;
  const ore = parseFloat(document.getElementById("f-ore").value) || 1;
  const not = document.getElementById("f-note").value.trim();
  if (!paz || !dat) {
    document.getElementById("f-paziente").style.borderColor = "#c44";
    return;
  }
  if (editId !== null) {
    visite = visite.map(v => v.id === editId
      ? { ...v, categoria:cat, paziente:paz, data:dat, ore, note:not }
      : v);
  } else {
    visite.push({ id: nextId++, categoria:cat, paziente:paz, data:dat, ore, note:not });
  }
  salvaStorage();
  chiudiForm();
  const meseVisita = dat.substring(0,7);
  if (meseVisita !== meseAttivo) meseAttivo = meseVisita;
  render();
}

function apriConfermaElimina(id) {
  eliminaId = id;
  document.getElementById("confirm-overlay").style.display = "flex";
}
function chiudiConferma() {
  eliminaId = null;
  document.getElementById("confirm-overlay").style.display = "none";
}
function confermElimina() {
  if (eliminaId !== null) {
    visite = visite.filter(v => v.id !== eliminaId);
    salvaStorage();
    render();
  }
  chiudiConferma();
}

document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) chiudiForm();
});

caricaStorage();
render();
</script>

</body>
</html>
